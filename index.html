<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Seratus Sayang 💕</title>
  <style>
    body {
      margin: 0;
      font-family: 'Comic Sans MS', cursive;
      text-align: center;
      background: linear-gradient(135deg, pink, lightyellow, lightblue);
      overflow: hidden;
    }

    h1 {
      margin-top: 50px;
      color: #ff4da6;
    }

    #message {
      font-size: 20px;
      margin-top: 20px;
      color: #333;
    }

    .btn {
      padding: 15px 25px;
      font-size: 18px;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      margin: 20px;
      transition: 0.3s;
    }

    #yesBtn {
      background-color: #ff66b2;
      color: white;
    }

    #noBtn {
      background-color: #66ccff;
      color: white;
      position: absolute;
    }

    .sticker {
      position: absolute;
      font-size: 30px;
      animation: float 3s infinite ease-in-out;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0px); }
    }

  </style>
</head>
<body>

  <h1>💖 Mau nggak jadi seratus sayangku? 💖</h1>

  <div id="message">Jawab jujur yaa 😆</div>

  <button id="yesBtn" class="btn">iyee sayang 😍</button>
  <button id="noBtn" class="btn">teaja deh 😝</button>

  <!-- Stiker lucu -->
  <div class="sticker" style="top:10%; left:10%;">💖</div>
  <div class="sticker" style="top:20%; right:15%;">🌸</div>
  <div class="sticker" style="bottom:15%; left:20%;">🐰</div>
  <div class="sticker" style="bottom:10%; right:10%;">✨</div>
  <div class="sticker" style="top:50%; left:5%;">💗</div>

  <script>
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const message = document.getElementById("message");

    // Posisi awal tombol "teaja deh"
    noBtn.style.top = "60%";
    noBtn.style.left = "55%";

    yesBtn.onclick = function() {
      message.innerHTML = "🥰 Yeayyy! Kamu sekarang resmi jadi seratus sayangku 💕✨";
    };

    noBtn.onmouseover = function() {
      let x = Math.random() * (window.innerWidth - 100);
      let y = Math.random() * (window.innerHeight - 50);

      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    };
  </script>

</body>
</html>
